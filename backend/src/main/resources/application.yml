spring:
  application:
    name: smartlock-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartlock3}
    username: ${SPRING_DATASOURCE_USERNAME:ali}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SmartLockHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
        generate_statistics: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 2000ms

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS:false}
        debug: false

  cache:
    type: redis
    redis:
      time-to-live: 300000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
        keep-alive: 60s
    scheduling:
      pool:
        size: 5

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: false
    mail:
      enabled: false
    db:
      enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}

ttlock:
  base-url: ${TTLOCK_BASE_URL:https://euopen.sciener.com}
  oauth-base-url: ${TTLOCK_OAUTH_BASE_URL:https://open.sciener.com}
  client-id: ${TTLOCK_CLIENT_ID}
  client-secret: ${TTLOCK_CLIENT_SECRET}
  redirect-uri: ${TTLOCK_REDIRECT_URI:http://localhost:8080/api/v1/ttlock/oauth/callback}
  retry:
    max-attempts: 3
    wait-duration-ms: 1000

resend:
  api-key: ${RESEND_API_KEY:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@propvian.com}
    from-name: ${MAIL_FROM_NAME:Propvian}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

resilience4j:
  retry:
    instances:
      ttlock:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
        ignore-exceptions:
          - com.smartlock.exception.TTLockException
  ratelimiter:
    instances:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0

logging:
  level:
    com.smartlock: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
