<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cleaning Task</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header { background: linear-gradient(135deg, #10b981, #059669); padding: 40px; text-align: center; }
  .header h1 { color: white; margin: 0; font-size: 24px; }
  .body { padding: 40px; }
  .task-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 20px; margin: 20px 0; }
  .footer { background: #f8fafc; padding: 20px 40px; text-align: center; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧹 Cleaning Task</h1>
  </div>
  <div class="body">
    <p>Hi <strong th:text="${cleanerName}">Cleaner</strong>,</p>
    <p>A guest has checked out. Please clean <strong th:text="${propertyName}">Property</strong>.</p>

    <div class="task-box">
      <p><strong>Property:</strong> <span th:text="${propertyName}">Property</span></p>
      <p><strong>Check-out time:</strong> <span th:text="${checkOutTime}">Time</span></p>
      <p><strong>Reservation ID:</strong> <span th:text="${reservationId}">ID</span></p>
    </div>

    <p style="color: #64748b; font-size: 14px;">
      Please ensure all rooms are cleaned and ready for the next guest.
    </p>
  </div>
  <div class="footer">
    <p>Powered by Propvian</p>
  </div>
</div>
</body>
</html>
