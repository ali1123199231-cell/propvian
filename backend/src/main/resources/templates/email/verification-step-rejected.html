<html xmlns:th="http://www.thymeleaf.org">

  <div style="background:#dc2626;color:#fff;border-radius:8px;padding:12px 16px;margin-bottom:24px;">

  <a href="https://propvian.com/verification" style="display:inline-block;margin-top:16px;padding:10px 24px;background:#4f46e5;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">Fix my verification</a>
