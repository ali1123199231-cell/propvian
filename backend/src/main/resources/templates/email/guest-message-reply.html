<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New reply from your host</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; color: #1e293b; }
  .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 36px 40px; }
  .header h1 { color: white; margin: 0 0 4px; font-size: 22px; }
  .header p { color: rgba(255,255,255,0.85); margin: 0; font-size: 14px; }
  .body { padding: 36px 40px; }
  .message-box { background: #f8fafc; border-left: 3px solid #6366f1; border-radius: 0 10px 10px 0; padding: 16px 20px; margin: 20px 0; font-size: 14px; color: #334155; line-height: 1.6; }
  .btn { display: inline-block; background: #6366f1; color: white !important; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-top: 8px; }
  .footer { background: #f8fafc; padding: 18px 40px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Your host replied</h1>
    <p th:text="${propertyName}">Property name</p>
  </div>
  <div class="body">
    <p style="font-size:14px; color:#475569; margin-top:0;">
      Hi <span th:text="${guestName}">there</span>, your host has replied to your message.
    </p>
    <div class="message-box" th:text="${replyBody}">Message body here.</div>
    <p style="font-size:14px; color:#475569;">
      View the full conversation and reply directly using the button below:
    </p>
    <a th:href="${conversationUrl}" class="btn">View conversation</a>
    <p style="font-size:12px; color:#94a3b8; margin-top:24px; word-break:break-all;">
      Or copy this link: <span th:text="${conversationUrl}"></span>
    </p>
  </div>
  <div class="footer">
    <p>Powered by Propvian · You received this because you messaged a property on Propvian.</p>
  </div>
</div>
</body>
</html>
