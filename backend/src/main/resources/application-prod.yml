spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  thymeleaf:
    cache: true

logging:
  level:
    com.smartlock: INFO
    org.springframework: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    root: WARN

server:
  error:
    include-stacktrace: never
    include-message: never
