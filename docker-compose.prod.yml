services:
  caddy:
    image: caddy:2-alpine
    container_name: smartlock-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - smartlock-net
    depends_on:
      - frontend

  postgres:
    image: postgres:16-alpine
    container_name: smartlock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartlock3
      POSTGRES_USER: ali
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ali -d smartlock3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlock-net

  redis:
    image: redis:7-alpine
    container_name: smartlock-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smartlock-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: smartlock-mailhog
    restart: unless-stopped
    networks:
      - smartlock-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartlock-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartlock3
      SPRING_DATASOURCE_USERNAME: ali
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      TTLOCK_BASE_URL: https://euapi.sciener.com
      TTLOCK_OAUTH_BASE_URL: https://euapi.sciener.com
      TTLOCK_CLIENT_ID: "${TTLOCK_CLIENT_ID}"
      TTLOCK_CLIENT_SECRET: "${TTLOCK_CLIENT_SECRET}"
      TTLOCK_REDIRECT_URI: https://propvian.com/api/v1/ttlock/oauth/callback
      FRONTEND_URL: https://propvian.com
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ACCESS_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 2592000000
      RESEND_API_KEY: "${RESEND_API_KEY}"
      MAIL_FROM: "${MAIL_FROM:-noreply@propvian.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Propvian}"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - smartlock-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartlock-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - smartlock-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  smartlock-net:
    driver: bridge
